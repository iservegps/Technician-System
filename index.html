<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tech Dashboard</title>
  
  <!-- PWA & Apple Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- Fonts & Icons & Framework -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    /* iOS / Modern App Design System */
    :root {
      --app-bg: #f2f2f7;
      --card-bg: #ffffff;
      --text-main: #1c1c1e;
      --text-muted: #8e8e93;
      --accent-blue: #007aff;
      --accent-green: #34c759;
      --accent-orange: #ff9500;
      --accent-red: #ff3b30;
      --accent-purple: #af52de;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --shadow-soft: 0 4px 24px rgba(0,0,0,0.04);
      --shadow-float: 0 10px 30px rgba(0,0,0,0.08);
    }

    body { 
      font-family: 'Prompt', sans-serif;
      background-color: var(--app-bg); 
      color: var(--text-main); 
      font-size: 15px; 
      -webkit-font-smoothing: antialiased;
      padding-bottom: 100px;
      padding-top: env(safe-area-inset-top);
    }

    /* Top App Bar */
    .app-header {
      background: var(--card-bg);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1020;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .app-title { font-size: 1.25rem; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
    .btn-icon-circular {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--app-bg);
      color: var(--accent-blue);
      display: flex; justify-content: center; align-items: center;
      border: none; transition: 0.2s;
    }
    .btn-icon-circular:active { transform: scale(0.9); }

    /* Custom Navigation (Desktop & Mobile) */
    .nav-pills-custom {
      background: #e3e3e8;
      border-radius: 20px;
      padding: 4px;
      display: inline-flex;
      margin: 20px 0;
      width: 100%;
      max-width: 400px;
    }
    .nav-pills-custom .nav-link {
      border-radius: 16px;
      color: var(--text-muted);
      font-weight: 600;
      padding: 10px 16px;
      text-align: center;
      flex: 1;
      border: none;
      background: transparent;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-pills-custom .nav-link.active {
      background: var(--card-bg);
      color: var(--text-main);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    /* List Item Cards (แทนที่ตาราง) */
    .data-list { display: flex; flex-direction: column; gap: 12px; }
    .list-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      align-items: center;
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s;
      border: 1px solid rgba(0,0,0,0.02);
    }
    .list-card:active { transform: scale(0.98); }
    .list-icon {
      width: 50px; height: 50px;
      border-radius: var(--radius-md);
      display: flex; justify-content: center; align-items: center;
      font-size: 1.2rem; margin-right: 16px; flex-shrink: 0;
    }
    .list-icon.blue { background: rgba(0, 122, 255, 0.1); color: var(--accent-blue); }
    .list-icon.green { background: rgba(52, 199, 89, 0.1); color: var(--accent-green); }
    .list-icon.orange { background: rgba(255, 149, 0, 0.1); color: var(--accent-orange); }
    
    .list-content { flex-grow: 1; min-width: 0; }
    .list-title { font-weight: 600; font-size: 1.05rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-subtitle { font-size: 0.85rem; color: var(--text-muted); margin: 2px 0 0 0; }
    
    .list-trailing { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .list-amount { font-weight: 700; font-size: 1rem; display: block; }
    .list-amount.positive { color: var(--accent-green); }
    .list-amount.neutral { color: var(--text-main); }
    .list-date { font-size: 0.75rem; color: var(--text-muted); }

    .action-badge {
      display: inline-block; padding: 4px 8px; border-radius: 8px;
      font-size: 0.75rem; font-weight: 600; margin-top: 4px;
    }

    /* Floating Bottom Dock (Mobile Navigation) */
    .floating-dock {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 8px 16px;
      display: flex;
      gap: 10px;
      box-shadow: var(--shadow-float);
      border: 1px solid rgba(255,255,255,0.4);
      z-index: 1030;
      width: max-content;
    }
    .dock-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 60px; height: 60px; border-radius: 20px;
      color: var(--text-muted); text-decoration: none; border: none; background: transparent;
      transition: 0.3s;
    }
    .dock-item i { font-size: 1.2rem; margin-bottom: 4px; }
    .dock-item span { font-size: 0.65rem; font-weight: 600; }
    .dock-item.active { background: var(--text-main); color: white; }

    /* Bento Box (Summary Page) */
    .bento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .bento-card {
      background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px;
      box-shadow: var(--shadow-soft); display: flex; flex-direction: column; justify-content: space-between;
    }
    .bento-card.full-width { grid-column: span 2; }
    .bento-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; margin-bottom: 12px; }
    .bento-value { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 4px; }
    .bento-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }

    /* Modals & Forms */
    .modal-content { border-radius: 32px; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .modal-header { border-bottom: none; padding: 24px 24px 10px 24px; }
    .modal-body { padding: 0 24px 24px 24px; }
    .modal-footer { border-top: none; padding: 16px 24px 24px 24px; }
    
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; margin-left: 4px;}
    .form-control, .form-select {
      background: var(--app-bg); border: none; border-radius: var(--radius-md);
      padding: 14px 16px; font-size: 1rem; color: var(--text-main); font-weight: 500;
      transition: all 0.2s;
    }
    .form-control:focus, .form-select:focus {
      background: #e3e3e8; box-shadow: none; outline: none;
    }
    .btn-primary-app {
      background: var(--accent-blue); color: white; font-weight: 600;
      border-radius: var(--radius-lg); padding: 16px; width: 100%; border: none;
      font-size: 1.05rem; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn-success-app { background: var(--accent-green); }

    /* Swipe Action (Simulated Buttons in card) */
    .card-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(0,0,0,0.05); }
    .btn-action { 
      flex: 1; padding: 8px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; border: none; 
      display: flex; justify-content: center; align-items: center; gap: 6px;
    }
    .btn-edit { background: rgba(0, 122, 255, 0.1); color: var(--accent-blue); }
    .btn-delete { background: rgba(255, 59, 48, 0.1); color: var(--accent-red); }

    /* Add Button (Floating above dock on mobile, or inline on desktop) */
    .top-action-btn { display: none; }

    @media (min-width: 768px) {
      body { padding-bottom: 40px; }
      .floating-dock { display: none; }
      .top-action-btn { display: inline-flex; }
      .app-container { max-width: 900px; margin: 0 auto; padding: 20px; }
      .app-header { border-radius: var(--radius-lg); margin-bottom: 20px; }
      .modal-dialog { max-width: 500px; }
    }
    @media (max-width: 767px) {
      .app-container { padding: 10px 16px; }
      .desktop-nav-wrap { display: flex; justify-content: center; }
      /* Bottom Sheet Modal for Mobile */
      .modal-dialog { margin: auto 0 0 0; align-items: flex-end; min-height: 100%; display: flex; }
      .modal-content { border-radius: 32px 32px 0 0; padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading" style="position: fixed; inset:0; background: var(--app-bg); z-index:9999; display:flex; flex-direction: column; justify-content:center; align-items:center;">
    <div class="spinner-border" style="width: 3rem; height: 3rem; color: var(--text-main);" role="status"></div>
    <h6 class="mt-4 fw-bold" style="color: var(--text-main);">กำลังโหลดข้อมูล...</h6>
  </div>

  <!-- Header -->
  <header class="app-header shadow-sm">
    <h1 class="app-title"><i class="fa-solid fa-bolt text-warning me-2"></i>TechSync</h1>
    <div>
      <button class="btn-icon-circular shadow-sm me-2 top-action-btn" id="headerAddBtn" onclick="executeAddAction()">
        <i class="fa-solid fa-plus"></i>
      </button>
      <button class="btn-icon-circular shadow-sm" onclick="initSystemSheets()">
        <i class="fa-solid fa-folder-plus"></i>
      </button>
    </div>
  </header>

  <div class="app-container">
    
    <!-- Segmented Control (Desktop Only, hidden on mobile logic handled via CSS/JS mix) -->
    <div class="desktop-nav-wrap d-none d-md-flex">
      <div class="nav nav-pills-custom" role="tablist">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#job-pane" type="button" onclick="updateView('job')">งานช่าง</button>
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#vehicle-pane" type="button" onclick="updateView('vehicle')">ใช้รถ</button>
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#summary-pane" type="button" onclick="triggerChartResize(); updateView('summary')">สรุปผล</button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="tab-content mt-2">
      
      <!-- 📌 แท็บ: งานช่าง -->
      <div class="tab-pane fade show active" id="job-pane">
        <div class="d-flex justify-content-between align-items-center mb-3 d-md-none">
          <h5 class="fw-bold m-0">รายการงาน</h5>
          <button class="btn btn-sm btn-primary rounded-pill px-3 fw-bold shadow-sm" style="background:var(--accent-blue); border:none;" onclick="openJobModal()">
            <i class="fa-solid fa-plus me-1"></i> เพิ่ม
          </button>
        </div>
        <div class="data-list" id="jobListContainer">
          <!-- Render Cards Here -->
        </div>
      </div>

      <!-- 📌 แท็บ: ใช้รถ -->
      <div class="tab-pane fade" id="vehicle-pane">
        <div class="d-flex justify-content-between align-items-center mb-3 d-md-none">
          <h5 class="fw-bold m-0">ประวัติการใช้รถ</h5>
          <button class="btn btn-sm btn-success rounded-pill px-3 fw-bold shadow-sm" style="background:var(--accent-green); border:none;" onclick="openVehicleModal()">
            <i class="fa-solid fa-plus me-1"></i> เพิ่ม
          </button>
        </div>
        <div class="data-list" id="vehicleListContainer">
          <!-- Render Cards Here -->
        </div>
      </div>

      <!-- 📌 แท็บ: สรุปผล (Bento Box) -->
      <div class="tab-pane fade" id="summary-pane">
        <div id="summaryCardsContainer">
          <!-- Render Bento Boxes Here -->
        </div>
      </div>

    </div>
  </div>

  <!-- 📱 Floating Dock (Mobile Only) -->
  <nav class="floating-dock nav" role="tablist">
    <button class="dock-item active" data-bs-toggle="tab" data-bs-target="#job-pane" type="button" onclick="updateView('job')">
      <i class="fa-solid fa-briefcase"></i><span>งานช่าง</span>
    </button>
    <button class="dock-item" data-bs-toggle="tab" data-bs-target="#vehicle-pane" type="button" onclick="updateView('vehicle')">
      <i class="fa-solid fa-car"></i><span>ใช้รถ</span>
    </button>
    <button class="dock-item" data-bs-toggle="tab" data-bs-target="#summary-pane" type="button" onclick="triggerChartResize(); updateView('summary')">
      <i class="fa-solid fa-chart-pie"></i><span>สรุป</span>
    </button>
  </nav>

  <!-- ================= MODALS ================= -->

  <!-- Modal Job -->
  <div class="modal fade" id="jobModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title fw-bold" id="jobModalTitle">บันทึกงานใหม่</h4>
          <button type="button" class="btn-close bg-light rounded-circle p-2" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="jobForm" onsubmit="submitJobForm(event)">
            <input type="hidden" id="jobId"><input type="hidden" id="jobRegion">
            <div class="row g-3">
              <div class="col-6">
                <div class="form-group mb-0"><label class="form-label">วันที่</label><input type="date" id="jobDate" class="form-control" required></div>
              </div>
              <div class="col-6">
                <div class="form-group mb-0"><label class="form-label">ประเภทงาน</label>
                  <select id="jobType" class="form-select" required>
                    <option value="ติดตั้ง">ติดตั้ง</option><option value="Service">Service</option><option value="ถอดเครื่อง">ถอดเครื่อง</option><option value="เปลี่ยนซิม">เปลี่ยนซิม</option>
                  </select>
                </div>
              </div>
              <div class="col-12">
                <div class="form-group mb-0"><label class="form-label">ชื่อ User ลูกค้า</label><input type="text" id="jobCustomer" class="form-control" placeholder="ระบุชื่อ User" required></div>
              </div>
              <div class="col-12">
                <div class="form-group mb-0"><label class="form-label">ทะเบียนรถลูกค้า</label><input type="text" id="jobCarLicense" class="form-control" placeholder="เช่น กข 1234" required></div>
              </div>
              <div class="col-12">
                <div class="form-group mb-0"><label class="form-label">จังหวัดหน้างาน</label>
                  <select id="jobProvince" class="form-select" onchange="syncRegion(this, 'jobRegion')" required>
                    <option value="">-- เลือกจังหวัด --</option>
                    <optgroup label="ภาคอีสาน">
    <option value="กาฬสินธุ์" data-region="ภาคอีสาน">กาฬสินธุ์</option>

    <option value="นครพนม" data-region="ภาคอีสาน">นครพนม</option>
    <option value="นครราชสีมา" data-region="ภาคอีสาน">นครราชสีมา</option>
    <option value="บึงกาฬ" data-region="ภาคอีสาน">บึงกาฬ</option>

    <option value="มุกดาหาร" data-region="ภาคอีสาน">มุกดาหาร</option>
    <option value="ยโสธร" data-region="ภาคอีสาน">ยโสธร</option>

<optgroup label="ภาคกลาง">

    <option value="พระนครศรีอยุธยา" data-region="ภาคกลาง">พระนครศรีอยุธยา</option>

  </optgroup>
  <optgroup label="ภาคเหนือ">
    <option value="เชียงใหม่" data-region="ภาคเหนือ">เชียงใหม่</option>
    <option value="เชียงราย" data-region="ภาคเหนือ">เชียงราย</option>

  </optgroup>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ⚠️ นำลิงก์ Web App URL ของคุณที่ได้จาก Google Apps Script (ตอน Deploy) มาใส่ตรงนี้
    const API_URL = "https://script.google.com/macros/s/AKfycbxBeNQHs4MDIPuPDiIO8uw4plcfPQbxlzjYfxjGEpupdQRTuygIl5ljkkjZeJI-3quS4Q/exec";

    let cacheData = { jobs: [], vehicles: [], summary: [] };
    let incomeChartInstance = null;
    let fuelChartInstance = null;
    let currentView = 'job';
    
    const jModal = new bootstrap.Modal(document.getElementById('jobModal'));
    const vModal = new bootstrap.Modal(document.getElementById('vehicleModal'));

    window.onload = function() {
      fetchData(false);
      registerPWA();
    };

    function showLoading(show) { 
      document.getElementById('loading').style.display = show ? 'flex' : 'none'; 
    }

    function updateView(viewName) {
      currentView = viewName;
      const addBtn = document.getElementById('headerAddBtn');
      if(viewName === 'summary') {
        addBtn.style.display = 'none';
      } else {
        addBtn.style.display = 'inline-flex';
        addBtn.style.color = viewName === 'job' ? 'var(--accent-blue)' : 'var(--accent-green)';
      }
    }
    
    function executeAddAction() {
      if(currentView === 'job') openJobModal();
      else if(currentView === 'vehicle') openVehicleModal();
    }

    function callAPI(method, payload, successCallback) {
      const options = { method: "POST", mode: "cors", redirect: "follow", body: JSON.stringify(payload) };
      fetch(API_URL, options)
        .then(response => response.json())
        .then(data => successCallback(data))
        .catch(err => {
          console.error(err); Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error'); showLoading(false);
        });
    }

    function initSystemSheets() {
      Swal.fire({ title: 'เปิดงวดใหม่?', text: 'ระบบจะสร้างแผ่นงานสำหรับงวดบัญชีปัจจุบัน', icon: 'info', showCancelButton: true, confirmButtonColor: 'var(--accent-blue)', confirmButtonText: 'ตกลง', cancelButtonText: 'ยกเลิก', shape: 'pill' }).then(r => {
        if(r.isConfirmed){ showLoading(true); callAPI("POST", { action: "initSheets" }, (res) => { if(res.success) { fetchData(false); } }); }
      });
    }

    function syncRegion(el, inputId) { document.getElementById(inputId).value = el.options[el.selectedIndex].getAttribute('data-region') || ''; }

    function calcVLive() {
      const sm = Number(document.getElementById('vStartMile').value)||0, em = Number(document.getElementById('vEndMile').value)||0;
      const fl = Number(document.getElementById('vFuelLiters').value)||0, fp = Number(document.getElementById('vFuelPrice').value)||0;
      document.getElementById('vLiveDist').innerText = (em - sm) + ' กม.';
      document.getElementById('vLiveCost').innerText = (fl * fp).toFixed(2) + ' ฿';
    }

    function fetchData(silent = false) {
      if (!silent) showLoading(true);
      fetch(API_URL).then(res => res.json()).then(data => {
          cacheData = data;
          renderJobList(data.jobs);
          renderVehicleList(data.vehicles);
          renderSummaryBento(data.summary);
          if (!silent) showLoading(false);
        }).catch(err => { console.error(err); if (!silent) showLoading(false); });
    }

    function renderJobList(jobs) {
      const container = document.getElementById('jobListContainer');
      if(!jobs.length) { container.innerHTML = '<div class="text-center text-muted p-5">ไม่มีข้อมูลงานในระบบ</div>'; return; }
      
      let html = '';
      jobs.forEach(j => {
        const total = Number(j["ค่าคอมมิชชั่น"]) + Number(j["เบี้ยเลี้ยง"]);
        let iconClass = 'blue'; let icon = 'fa-wrench';
        if(j["ประเภทงาน"] === 'เปลี่ยนซิม') { iconClass = 'orange'; icon = 'fa-sim-card'; }
        
        html += `
        <div class="list-card flex-column align-items-stretch">
          <div class="d-flex w-100">
            <div class="list-icon ${iconClass}"><i class="fa-solid ${icon}"></i></div>
            <div class="list-content">
              <h4 class="list-title">${j["Userลูกค้า"]}</h4>
              <p class="list-subtitle">${j["จังหวัด"]} • ${j["ประเภทงาน"]}</p>
              <span class="action-badge bg-light text-dark border">${j["ทะเบียนรถ"]}</span>
            </div>
            <div class="list-trailing">
              <span class="list-amount positive">+${total} ฿</span>
              <span class="list-date">${j["วันที่"]}</span>
              <span class="d-block mt-1 text-muted" style="font-size:0.7rem;">งวด ${j["รอบเดือน"].split(' ')[1] || ''}</span>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-action btn-edit" onclick="editJob('${j["ID"]}')"><i class="fa-solid fa-pen"></i> แก้ไข</button>
            <button class="btn-action btn-delete" onclick="deleteJob('${j["ID"]}')"><i class="fa-solid fa-trash"></i> ลบ</button>
          </div>
        </div>`;
      });
      container.innerHTML = html;
    }

    function renderVehicleList(vehicles) {
      const container = document.getElementById('vehicleListContainer');
      if(!vehicles.length) { container.innerHTML = '<div class="text-center text-muted p-5">ไม่มีข้อมูลการใช้รถ</div>'; return; }
      
      let html = '';
      vehicles.forEach(v => {
        html += `
        <div class="list-card flex-column align-items-stretch">
          <div class="d-flex w-100">
            <div class="list-icon green"><i class="fa-solid fa-car-side"></i></div>
            <div class="list-content">
              <h4 class="list-title">${v["ปลายทาง"]}</h4>
              <p class="list-subtitle">${v["ชื่อลูกค้า"]}</p>
              <span class="action-badge" style="background:#f2f2f7;">ระยะ ${v["ระยะทาง"]} กม.</span>
            </div>
            <div class="list-trailing">
              <span class="list-amount" style="color:var(--accent-red);">${Number(v["ค่าน้ำมัน"]) > 0 ? '-' : ''}${v["ค่าน้ำมัน"]} ฿</span>
              <span class="list-date">${v["วันที่"]}</span>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-action btn-edit" onclick="editVehicle('${v["ID"]}')"><i class="fa-solid fa-pen"></i> แก้ไข</button>
            <button class="btn-action btn-delete" onclick="deleteVehicle('${v["ID"]}')"><i class="fa-solid fa-trash"></i> ลบ</button>
          </div>
        </div>`;
      });
      container.innerHTML = html;
    }

    // Modal Actions & Submits
    function openJobModal() {
      document.getElementById('jobForm').reset(); document.getElementById('jobId').value = '';
      document.getElementById('jobDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('jobModalTitle').innerText = 'บันทึกงานใหม่'; jModal.show();
    }
    function editJob(id) {
      const j = cacheData.jobs.find(x => x["ID"] == id); if(!j) return;
      document.getElementById('jobId').value = j["ID"]; document.getElementById('jobDate').value = j["วันที่"];
      document.getElementById('jobType').value = j["ประเภทงาน"]; document.getElementById('jobCustomer').value = j["Userลูกค้า"];
      document.getElementById('jobCarLicense').value = j["ทะเบียนรถ"]; document.getElementById('jobProvince').value = j["จังหวัด"];
      document.getElementById('jobRegion').value = j["ภาค"]; document.getElementById('jobModalTitle').innerText = 'แก้ไขงาน'; jModal.show();
    }
    function submitJobForm(e) {
      e.preventDefault();
      const job = { id: document.getElementById('jobId').value, date: document.getElementById('jobDate').value, jobType: document.getElementById('jobType').value, customerUser: document.getElementById('jobCustomer').value, carLicense: document.getElementById('jobCarLicense').value, province: document.getElementById('jobProvince').value, region: document.getElementById('jobRegion').value };
      jModal.hide(); Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      callAPI("POST", { action: "saveJob", data: job }, () => { Swal.close(); fetchData(true); });
    }
    function deleteJob(id) {
      Swal.fire({ title: 'ลบข้อมูล?', icon: 'warning', showCancelButton: true, confirmButtonColor: 'var(--accent-red)', confirmButtonText: 'ลบ', cancelButtonText: 'ยกเลิก' }).then(r => {
        if(r.isConfirmed) { Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() }); callAPI("POST", { action: "deleteJob", id: id }, () => { fetchData(true); Swal.close(); }); }
      });
    }

    function openVehicleModal() {
      document.getElementById('vehicleForm').reset(); document.getElementById('vId').value = '';
      document.getElementById('vDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('vStartLoc').value = 'ออฟฟิศขอนแก่น'; calcVLive(); vModal.show();
    }
    function editVehicle(id) {
      const v = cacheData.vehicles.find(x => x["ID"] == id); if(!v) return;
      document.getElementById('vId').value = v["ID"]; document.getElementById('vDate').value = v["วันที่"];
      document.getElementById('vStartLoc').value = v["จุดเริ่มต้น"]; document.getElementById('vDestLoc').value = v["ปลายทาง"];
      document.getElementById('vJobType').value = v["ประเภทงาน"]; document.getElementById('vCustomerName').value = v["ชื่อลูกค้า"];
      document.getElementById('vCustomerUser').value = v["Userลูกค้า"]; document.getElementById('vProvince').value = v["จังหวัด"];
      document.getElementById('vRegion').value = v["ภาค"]; document.getElementById('vStartMile').value = v["เลขไมล์เริ่ม"];
      document.getElementById('vEndMile').value = v["เลขไมล์สิ้นสุด"]; document.getElementById('vFuelLiters').value = v["ปริมาณน้ำมัน(ลิตร)"];
      document.getElementById('vFuelPrice').value = v["ราคาต่อลิตร"]; document.getElementById('vReceiptNo').value = v["เลขใบเสร็จ"];
      calcVLive(); document.getElementById('vehicleModalTitle').innerText = 'แก้ไขข้อมูลรถ'; vModal.show();
    }
    function submitVehicleForm(e) {
      e.preventDefault();
      const v = { id: document.getElementById('vId').value, date: document.getElementById('vDate').value, startLoc: document.getElementById('vStartLoc').value, destLoc: document.getElementById('vDestLoc').value, jobType: document.getElementById('vJobType').value, customerName: document.getElementById('vCustomerName').value, customerUser: document.getElementById('vCustomerUser').value, province: document.getElementById('vProvince').value, region: document.getElementById('vRegion').value, startMile: document.getElementById('vStartMile').value, endMile: document.getElementById('vEndMile').value, fuelLiters: document.getElementById('vFuelLiters').value, fuelPrice: document.getElementById('vFuelPrice').value, receiptNo: document.getElementById('vReceiptNo').value };
      vModal.hide(); Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      callAPI("POST", { action: "saveVehicle", data: v }, () => { Swal.close(); fetchData(true); });
    }
    function deleteVehicle(id) {
      Swal.fire({ title: 'ลบข้อมูล?', icon: 'warning', showCancelButton: true, confirmButtonColor: 'var(--accent-red)', confirmButtonText: 'ลบ', cancelButtonText: 'ยกเลิก' }).then(r => {
        if(r.isConfirmed) { Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() }); callAPI("POST", { action: "deleteVehicle", id: id }, () => { fetchData(true); Swal.close(); }); }
      });
    }

    function renderSummaryBento(summaryList) {
  const container = document.getElementById('summaryCardsContainer');
  if (!summaryList.length) {
    container.innerHTML = '<div class="text-center text-muted p-5">ยังไม่มีข้อมูลสรุป</div>';
    return;
  }

  let html = '';
  // กราฟ (Charts) ไว้ด้านบนสุด
  html += `
    <div class="bento-card mb-3 p-3">
      <span class="bento-label mb-2 d-block">แนวโน้มรายรับ</span>
      <div style="height: 180px;"><canvas id="incomeChart"></canvas></div>
    </div>
  `;

  summaryList.forEach(s => {
    // ตรวจสอบค่าก่อนแสดงผลเพื่อป้องกัน Error ในกรณีที่ข้อมูลเป็น undefined
    const totalComm = s.totalComm || 0;
    const totalAllowance = s.totalAllowance || 0;
    const grandTotal = s.grandTotalJobsCost || 0;

    html += `
    <h5 class="fw-bold mt-4 mb-3 ps-2" style="font-size:1.1rem;">รอบงวด: ${s.period}</h5>
    <div class="bento-grid">
      
      <!-- 1. รายได้รวมทั้งหมด -->
      <div class="bento-card full-width" style="background: linear-gradient(135deg, var(--accent-blue), #5856D6); color: white;">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <span class="bento-label text-white opacity-75">รายได้รวมทั้งหมด</span>
            <div class="bento-value text-white mt-1">฿ ${grandTotal.toLocaleString()}</div>
          </div>
          <div class="bento-icon" style="background:rgba(255,255,255,0.2);"><i class="fa-solid fa-wallet"></i></div>
        </div>
      </div>

      <!-- 2. ค่าคอมมิชชั่น (แยกออกมา) -->
      <div class="bento-card">
        <div class="bento-icon" style="background:rgba(0,122,255,0.1); color:var(--accent-blue);"><i class="fa-solid fa-sack-dollar"></i></div>
        <div class="bento-value">${totalComm.toLocaleString()} ฿</div>
        <span class="bento-label">ค่าคอมมิชชั่น</span>
      </div>

      <!-- 3. เบี้ยเลี้ยง (แยกออกมา) -->
      <div class="bento-card">
        <div class="bento-icon" style="background:rgba(255,149,0,0.1); color:var(--accent-orange);"><i class="fa-solid fa-utensils"></i></div>
        <div class="bento-value">${totalAllowance.toLocaleString()} ฿</div>
        <span class="bento-label">เบี้ยเลี้ยง</span>
      </div>

      <!-- 4. ระยะทาง -->
      <div class="bento-card">
        <div class="bento-icon" style="background:rgba(52,199,89,0.1); color:var(--accent-green);"><i class="fa-solid fa-road"></i></div>
        <div class="bento-value">${s.totalDist.toLocaleString()}</div>
        <span class="bento-label">ระยะทาง (กม.)</span>
      </div>

      <!-- 5. ค่าน้ำมัน -->
      <div class="bento-card">
        <div class="bento-icon" style="background:rgba(255,59,48,0.1); color:var(--accent-red);"><i class="fa-solid fa-gas-pump"></i></div>
        <div class="bento-value">฿ ${s.totalFuelCost.toLocaleString()}</div>
        <span class="bento-label">ค่าน้ำมันรวม</span>
      </div>

      <!-- 6. อัตราสิ้นเปลือง -->
      <div class="bento-card full-width">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <span class="bento-label">อัตราสิ้นเปลือง</span>
            <div class="bento-value mt-1" style="color:var(--accent-purple);">${s.fuelEfficiency} <span style="font-size:0.9rem;">กม./ลิตร</span></div>
          </div>
          <div class="bento-icon" style="background:rgba(175,82,222,0.1); color:var(--accent-purple);"><i class="fa-solid fa-gauge-high"></i></div>
        </div>
      </div>
      
    </div>`;
  });
  container.innerHTML = html;
  renderCharts(summaryList);
}

    function renderCharts(summaryList) {
      const labels = summaryList.map(s => s.period.split(' ')[1] || s.period);
      const commData = summaryList.map(s => s.totalComm), allowData = summaryList.map(s => s.totalAllowance);
      
      if (incomeChartInstance) incomeChartInstance.destroy();
      Chart.defaults.font.family = 'Prompt';
      
      const ctx = document.getElementById('incomeChart');
      if(!ctx) return;
      incomeChartInstance = new Chart(ctx.getContext('2d'), {
        type: 'bar',
        data: { labels: labels, datasets: [
          { label: 'ค่าคอมฯ', data: commData, backgroundColor: '#007aff', borderRadius: 4 },
          { label: 'เบี้ยเลี้ยง', data: allowData, backgroundColor: '#34c759', borderRadius: 4 }
        ]},
        options: { 
          responsive: true, maintainAspectRatio: false, 
          scales: { x: { stacked: true, grid: {display:false} }, y: { stacked: true, border:{display:false}, ticks:{font:{size:10}} } }, 
          plugins: { legend: { position: 'top', labels:{boxWidth:10, font:{size:11}} } } 
        }
      });
    }

    function triggerChartResize() { setTimeout(() => { if(incomeChartInstance) incomeChartInstance.resize(); }, 300); }

    function registerPWA() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
      }
    }
  </script>
